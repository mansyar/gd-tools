name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  GODOT_VERSION: '4.6'

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Stage 1: Lint, Format & Unit Tests
  # ──────────────────────────────────────────────────────────────────
  lint-format-unit:
    name: Stage 1 - Lint, Format & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (black)
        run: black --check src/ tests/

      - name: Run unit tests with coverage
        run: pytest tests/unit/ -m unit --cov=gd_tools --cov-report=xml --cov-report=html --junitxml=junit-unit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results-unit
          path: junit-unit.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # Cross-Platform Matrix: Unit Tests
  # ──────────────────────────────────────────────────────────────────
  matrix-unit:
    name: Unit Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs: lint-format-unit
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -m unit --no-cov --junitxml=junit-matrix.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: junit-matrix.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # Stage 2: Integration Tests (requires Godot binary)
  # ──────────────────────────────────────────────────────────────────
  integration:
    name: Stage 2 - Integration Tests
    needs: lint-format-unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GODOT_BIN: /usr/local/bin/godot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          rm -f Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip

      - name: Verify Godot installation
        run: godot --version

      - name: Run integration tests
        run: pytest tests/integration/ -m integration --no-cov --junitxml=junit-integration.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results-integration
          path: junit-integration.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # Stage 3: E2E Tests (requires Godot + sample project)
  # ──────────────────────────────────────────────────────────────────
  e2e:
    name: Stage 3 - E2E Tests
    needs: integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GODOT_BIN: /usr/local/bin/godot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          rm -f Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip

      - name: Verify Godot installation
        run: godot --version

      - name: Run E2E tests
        run: pytest tests/e2e/ -m e2e --no-cov --junitxml=junit-e2e.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results-e2e
          path: junit-e2e.xml
          retention-days: 7
